<script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT DI SINI
        const GAS_URL = "URL_WEB_APP_ANDA_DISINI"; 
        
        document.getElementById('supabaseDot').classList.add('connected');
        document.getElementById('supabaseText').innerText = "Google Apps Script Terkoneksi!";
        
        let localDataNotulensi = [];
        let uploadedPhotos = [];
        let dataUndanganFile = null;
        let dataAbsenFile = null;

        loadNotulensi();

        // Helper untuk mengubah file menjadi Base64 (Syarat wajib untuk upload ke GAS)
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve({
                filename: file.name,
                mimeType: file.type,
                base64: reader.result.split(',')[1]
            });
            reader.onerror = error => reject(error);
        });

        async function loadNotulensi() {
            const container = document.getElementById('rekapContainer');
            if(!container) return;
            container.innerHTML = '<div class="loading-text" style="text-align:center; width:100%;">Memuat rekap data dari Google Sheets...</div>';
            
            try {
                const response = await fetch(GAS_URL);
                const result = await response.json();
                
                if (result.status !== "success" || !result.data || result.data.length === 0) { 
                    container.innerHTML = '<div class="loading-text" style="text-align:center; width:100%;">Belum ada rekaman notulensi di cloud.</div>'; 
                    return; 
                }
                
                localDataNotulensi = result.data;
                container.innerHTML = "";
                
                result.data.forEach(item => {
                    let fileBadge = "";
                    let viewFilesBtn = "";
                    if(item.file_undangan || item.file_absen || item.file_foto) {
                        fileBadge = `<span style="color:var(--accent-cyan); font-size:11px; margin-left:8px;"><i class="fa-solid fa-paperclip"></i> Berkas Terlampir</span>`;
                        let targetLink = item.file_undangan || item.file_absen || (item.file_foto ? item.file_foto.split(',')[0] : '#');
                        viewFilesBtn = `<a href="${targetLink}" target="_blank" class="btn btn-sm btn-view-file"><i class="fa-solid fa-link" style="margin-right:5px;"></i> Cek File</a>`;
                    }

                    const card = document.createElement('div'); card.className = 'rekap-card';
                    card.innerHTML = `
                        <div>
                            <div class="rekap-title">${item.judul || '-'} ${fileBadge}</div>
                            <div class="rekap-meta">
                                <div><i class="fa-solid fa-calendar-days"></i> ${item.tanggal || '-'}</div>
                                <div><i class="fa-solid fa-user-tie"></i> Pemimpin: ${item.pemimpin_rapat || '-'}</div>
                            </div>
                            <div class="rekap-body">${item.isi_notulen || '-'}</div>
                        </div>
                        <div class="rekap-actions">
                            ${viewFilesBtn}
                            <button class="btn btn-sm btn-delete" onclick="deleteNotulen('${item.id}')">Hapus</button>
                            <button class="btn btn-sm btn-load-print" onclick="triggerPrintFromData('${item.id}')">Cetak Arsip</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<div class="loading-text" style="color:red;">Error mengambil data rekap: ${err.message}</div>`;
            }
        }

        async function deleteNotulen(id) {
            if (!confirm("Yakin ingin menghapus data ini secara permanen dari Database?")) return;
            try {
                const response = await fetch(`${GAS_URL}?action=delete&id=${id}`);
                const result = await response.json();
                if(result.status === "success") {
                    alert("Sukses dihapus!");
                    loadNotulensi(); 
                } else {
                    throw new Error("Gagal menghapus data.");
                }
            } catch (err) { 
                alert("Gagal menghapus! Pesan Error: " + err.message); 
            }
        }

        // [FUNGSI handleSingleFile, removeSingleFile, handleMultipleImages, checkAttachmentsVisibility, triggerPrint, dan triggerPrintFromData TETAP SAMA SEPERTI KODE ASLI ANDA]
        function handleSingleFile(input, previewId) {
            const container = document.getElementById(previewId); 
            if (!container) return; 
            container.innerHTML = ""; 

            if (input.files && input.files[0]) {
                const file = input.files[0];
                const isImage = file.type.startsWith('image/');

                if(previewId === 'previewUndangan') {
                    dataUndanganFile = file;
                    document.getElementById('printUndanganMeta').style.display = 'block';
                    if(isImage) {
                        const reader = new FileReader();
                        reader.onload = e => document.getElementById('printUndanganImage').innerHTML = `<img src="${e.target.result}">`;
                        reader.readAsDataURL(file);
                    } else {
                        document.getElementById('printUndanganImage').innerHTML = `<p style="font-style:italic; margin-top:10px;">[Dokumen berformat PDF telah dilampirkan. Hanya tercetak jika diakses via Cloud Archive.]</p>`;
                    }
                }

                if(previewId === 'previewAbsen') {
                    dataAbsenFile = file;
                    document.getElementById('printAbsenMeta').style.display = 'block';
                    if(isImage) {
                        const reader = new FileReader();
                        reader.onload = e => document.getElementById('printAbsenImage').innerHTML = `<img src="${e.target.result}">`;
                        reader.readAsDataURL(file);
                    } else {
                        document.getElementById('printAbsenImage').innerHTML = `<p style="font-style:italic; margin-top:10px;">[Dokumen berformat PDF telah dilampirkan. Hanya tercetak jika diakses via Cloud Archive.]</p>`;
                    }
                }

                container.innerHTML = `<div class="file-item"><span><i class="fa-solid fa-file-circle-check"></i> ${file.name}</span><i class="fa-solid fa-trash-can" onclick="removeSingleFile('${previewId}')"></i></div>`;
                checkAttachmentsVisibility();
            }
        }

        function removeSingleFile(previewId) {
            const container = document.getElementById(previewId);
            if (container) container.innerHTML = "";

            if(previewId === 'previewUndangan') {
                document.getElementById('fileUndangan').value = ""; 
                dataUndanganFile = null;
                document.getElementById('printUndanganMeta').style.display = 'none'; 
                document.getElementById('printUndanganImage').innerHTML = "";
            }
            if(previewId === 'previewAbsen') {
                document.getElementById('fileAbsen').value = ""; 
                dataAbsenFile = null;
                document.getElementById('printAbsenMeta').style.display = 'none'; 
                document.getElementById('printAbsenImage').innerHTML = "";
            }
            checkAttachmentsVisibility();
        }

        function handleMultipleImages(input) {
            if (input.files) {
                Array.from(input.files).forEach(file => {
                    if (!file.type.startsWith('image/')) return;
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        uploadedPhotos.push(file);
                        document.getElementById('previewFotoGallery').innerHTML += `<div class="gallery-img-wrapper"><img src="${e.target.result}"></div>`;
                        document.getElementById('printPhotosGallery').innerHTML += `<div class="print-gallery-item"><img src="${e.target.result}"><p>Kegiatan: ${file.name}</p></div>`;
                        checkAttachmentsVisibility();
                    }
                    reader.readAsDataURL(file);
                });
            }
        }

        function checkAttachmentsVisibility() {
            const zone = document.getElementById('printAttachmentsZone');
            if (!zone) return;
            if (uploadedPhotos.length > 0 || dataUndanganFile || dataAbsenFile) {
                zone.setAttribute("style", "display: block !important;");
            } else {
                zone.setAttribute("style", "display: none !important;");
            }
        }

        window.triggerPrint = function() {
            try {
                checkAttachmentsVisibility(); 
                document.getElementById('p-judul').innerText = document.getElementById('judul').value || '-';
                document.getElementById('p-tanggal').innerText = document.getElementById('tanggal').value || '-';
                document.getElementById('p-waktu').innerText = document.getElementById('waktu').value || '-';
                document.getElementById('p-tempat').innerText = document.getElementById('tempat').value || '-';
                document.getElementById('p-pemimpin').innerText = document.getElementById('pemimpin').value || '-';
                document.getElementById('p-isi').innerText = document.getElementById('isiNotulen').value || '-';
                document.getElementById('p-current-date').innerText = new Date().toLocaleDateString('id-ID');
                
                window.print();
            } catch (err) {
                alert("Sistem Cetak Gagal: " + err.message);
            }
        }

        window.triggerPrintFromData = function(id) {
            try {
                const item = localDataNotulensi.find(x => String(x.id) === String(id));
                if (!item) {
                    alert("Gagal memuat: Data arsip tidak ditemukan!");
                    return;
                }

                document.getElementById('p-judul').innerText = item.judul || '-';
                document.getElementById('p-tanggal').innerText = item.tanggal || '-';
                document.getElementById('p-waktu').innerText = item.waktu || '-';
                document.getElementById('p-tempat').innerText = item.tempat || '-';
                document.getElementById('p-pemimpin').innerText = item.pemimpin_rapat || '-';
                document.getElementById('p-isi').innerText = item.isi_notulen || '-';
                
                const dateObj = new Date(item.created_at);
                document.getElementById('p-current-date').innerText = isNaN(dateObj) ? new Date().toLocaleDateString('id-ID') : dateObj.toLocaleDateString('id-ID');
                
                document.getElementById('printUndanganMeta').style.display = 'none';
                document.getElementById('printAbsenMeta').style.display = 'none';
                document.getElementById('printPhotosGallery').innerHTML = '';
                
                let hasAttachments = false;

                if (item.file_undangan) {
                    document.getElementById('printUndanganMeta').style.display = 'block';
                    document.getElementById('printUndanganImage').innerHTML = `<p style="margin-top:10px;">Dokumen Terlampir. <strong><a href="${item.file_undangan}" target="_blank">Lihat Berkas</a></strong></p>`;
                    hasAttachments = true;
                }

                if (item.file_absen) {
                    document.getElementById('printAbsenMeta').style.display = 'block';
                    document.getElementById('printAbsenImage').innerHTML = `<p style="margin-top:10px;">Dokumen Terlampir. <strong><a href="${item.file_absen}" target="_blank">Lihat Berkas</a></strong></p>`;
                    hasAttachments = true;
                }

                if (item.file_foto) {
                    const fotos = item.file_foto.split(',');
                    let galleryHTML = '';
                    fotos.forEach((url, index) => {
                        if(url.trim() !== '') {
                            galleryHTML += `<div class="print-gallery-item"><p>Dokumentasi ${index + 1} - <a href="${url}" target="_blank">Lihat Foto</a></p></div>`;
                            hasAttachments = true;
                        }
                    });
                    document.getElementById('printPhotosGallery').innerHTML = galleryHTML;
                }

                const zone = document.getElementById('printAttachmentsZone');
                if (hasAttachments) {
                    zone.setAttribute("style", "display: block !important;");
                    setTimeout(() => { window.print(); }, 500);
                } else {
                    zone.setAttribute("style", "display: none !important;");
                    window.print();
                }
            } catch (err) {
                alert("Sistem Cetak Arsip Gagal: " + err.message);
            }
        }

        async function saveNotulen(event) {
            event.preventDefault();

            const btnSimpan = document.getElementById('btnSimpan');
            const statusDot = document.getElementById('supabaseDot');
            const statusText = document.getElementById('supabaseText');
            
            btnSimpan.disabled = true;
            btnSimpan.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses Data...';
            statusDot.classList.replace('connected', 'uploading');
            statusText.innerText = "Sedang mengirim data ke Google Sheets...";

            try {
                // Konversi semua file ke format base64
                let undanganB64 = dataUndanganFile ? await toBase64(dataUndanganFile) : null;
                let absenB64 = dataAbsenFile ? await toBase64(dataAbsenFile) : null;
                let fotoB64 = [];
                
                if (uploadedPhotos.length > 0) {
                    for (let i = 0; i < uploadedPhotos.length; i++) {
                        fotoB64.push(await toBase64(uploadedPhotos[i]));
                    }
                }

                const payload = {
                    judul: document.getElementById('judul').value, 
                    tanggal: document.getElementById('tanggal').value,
                    waktu: document.getElementById('waktu').value, 
                    tempat: document.getElementById('tempat').value,
                    pemimpin_rapat: document.getElementById('pemimpin').value, 
                    isi_notulen: document.getElementById('isiNotulen').value,
                    file_undangan: undanganB64,
                    file_absen: absenB64,
                    file_foto: fotoB64
                };

                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.status === "error") throw new Error(result.message);

                alert("Selamat! Semua Data & Lampiran Berkas berhasil disimpan ke Google Sheets & Drive!");
                
                document.getElementById('notulenForm').reset();
                const galUi = document.getElementById('previewFotoGallery');
                const galPrint = document.getElementById('printPhotosGallery');
                if (galUi) galUi.innerHTML = "";
                if (galPrint) galPrint.innerHTML = "";
                removeSingleFile('previewUndangan'); 
                removeSingleFile('previewAbsen');
                uploadedPhotos = []; 
                checkAttachmentsVisibility(); 
                
                loadNotulensi();

            } catch (err) { 
                alert("Gagal menyimpan data: " + err.message);
            } finally {
                btnSimpan.disabled = false;
                btnSimpan.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Simpan ke Database';
                statusDot.classList.replace('uploading', 'connected');
                statusText.innerText = "Google Apps Script Terkoneksi!";
            }
        }
    </script>
